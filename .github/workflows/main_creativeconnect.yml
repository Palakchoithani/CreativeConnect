name: Build and deploy API to Azure Web App

on:
  push:
    branches:
      - main
    paths:
      - 'apps/api/**'
      - 'package.json'
      - 'package-lock.json'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js version
        uses: actions/setup-node@v3
        with:
          node-version: '20.x'

      - name: npm install, build, and test
        run: |
          npm ci
          npm run build --workspace=api

      - name: Zip artifact for deployment
        run: |
          cd apps/api
          zip -r ../../release.zip ./* -x "src/*" -x "prisma/*" -x ".env"

      - name: Add node_modules to artifact
        run: zip -ur release.zip node_modules

      - name: Upload artifact for deployment job
        uses: actions/upload-artifact@v4
        with:
          name: node-app
          path: release.zip

  deploy:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: node-app
      
      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_C40A7B3EA0E949C7843D70E74425A335 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_9423DBB114ED4EF5BA164F42A5E1AD34 }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_C748DD0300FA40CCB68FB2D3221C0560 }}

      - name: 'Deploy to Azure Web App'
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'creativeconnect'
          slot-name: 'Production'
          package: release.zip
